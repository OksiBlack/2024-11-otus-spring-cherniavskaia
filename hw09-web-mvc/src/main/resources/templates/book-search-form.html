<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <!-- Updated to Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <title>Search Book</title>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div>
    <hr>
</div>
<!--<div th:insert="fragments/book-search-form :: book-search-form"></div>-->

<div class="container mb-4">
    <hr>
    <p class="h4 mb-4">Search for the book by criteria:</p>
    <form action="#" th:action="@{/books/search/advanced}"
          th:object="${bookFilter}" method="POST" class="form-control form-control-sm">

        <input th:field="*{id}" class="form-control mb-4 col-4" placeholder="Book id" th:value="${bookFilter.id}"/>

        <input type="text" th:field="*{title}"
               class="form-control mb-4 col-4" placeholder="Book name" th:value="${bookFilter.title}">
        <input type="text" th:field="*{authorName}"
               class="form-control mb-4 col-4" placeholder="Book's Author" th:value="${bookFilter.authorName}">
        <input type="text" th:field="*{description}"
               class="form-control mb-4 col-4" placeholder="Book description" th:value="${bookFilter.description}">
        <input type="text" th:field="*{serialNumber}"
               class="form-control mb-4 col-4" placeholder="Serial Number" th:value="${bookFilter.serialNumber}">

        <input type="text" th:field="*{isbn}"
               class="form-control mb-4 col-4" placeholder="ISBN" th:value="${bookFilter.isbn}">
        <input type="text" th:field="*{genreName}"
               class="form-control mb-4 col-4" placeholder="Genre name" th:value="${bookFilter.genreName}">

        <button type="submit" class="btn btn-info col-2">Search</button>
    </form>
    <hr>
</div>
</body>
</html>
